<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetiful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container-fluid d-flex">
        <!-- Sidebar (left) -->
        <div class="sidebar-container col-md-3">
            <div id="commandBuilder">
                <h5>Command Builder</h5>
                <select id="command" class="form-select" onchange="updateCommandOptions()">
                    <option value="" disabled selected>Choose Command</option>
                    <option value="import">Import</option>
                    <option value="update">Update</option>
                    <option value="list">List</option>
                    <option value="modify">Modify</option>
                    <option value="config">Config</option>
                </select>
                <div id="command-options" class="mt-2"></div>
                <button class="btn btn-primary mt-2" onclick="runCommand()">Run Command</button>
                <pre id="commandPreview" class="mt-2"></pre>
                <pre id="commandResult" class="mt-2"></pre>
            </div>

            <div id="configEditor" class="mt-4">
                <h5>Config Editor</h5>
                <textarea id="configTextArea" rows="10" class="form-control"></textarea>
                <button class="btn btn-success mt-2" onclick="editConfig()">Save Config</button>
                <pre id="configResult" class="mt-2"></pre>
            </div>
        </div>

        <!-- Main Content (table and form) -->
<div class="main-content col-md-6">
    <!-- Shown when no beets library exists; hides the table/toolbar below. -->
    <div id="libraryNotice" class="alert alert-warning mt-3" style="display: none;"></div>

    <!-- Stats summary (populated by getStats) + Clear Filters. Filtering,
         sorting and pagination are handled by the Tabulator grid itself. -->
    <div id="libraryToolbar" class="d-flex justify-content-between align-items-center my-2">
        <div id="libraryStats" class="stat-summary">
            <span>Tracks <span id="totalTracks" class="stat-count"></span></span>
            <span>Artists <span id="totalArtists" class="stat-count"></span></span>
            <span>Albums <span id="totalAlbums" class="stat-count"></span></span>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="clearFilters" onclick="clearFilters()">Clear Filters</button>
    </div>

    <div class="table-container">
        <div id="libraryTable"></div>
    </div>
</div>



        <!-- Form Container (right) -->
        <div class="form-container col-md-3">
            <div id="editFormContainer"></div>
        </div>
    </div>
    
    
    
    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
    <script src="static/js/library.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
